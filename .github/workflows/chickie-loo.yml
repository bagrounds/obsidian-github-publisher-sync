name: Chickie Loo — Daily Post

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

env:
  TZ: America/Los_Angeles

permissions:
  contents: read
  discussions: read

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: obsidian-vault-

      - name: Pull Vault Posts
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: |
          npx tsx -e "(async () => {
            const { syncObsidianVault } = await import('./scripts/lib/obsidian-sync.ts');
            const fs = await import('fs');
            const path = await import('path');
            const vaultDir = await syncObsidianVault({
              authToken: process.env.OBSIDIAN_AUTH_TOKEN,
              vaultName: process.env.OBSIDIAN_VAULT_NAME,
            });
            const seriesId = 'chickie-loo';
            const vaultSeries = path.join(vaultDir, seriesId);
            if (fs.existsSync(vaultSeries)) {
              const posts = fs.readdirSync(vaultSeries).filter(f => f.match(/^\d{4}-\d{2}-\d{2}.*\.md$/));
              console.log(JSON.stringify({ event: 'vault_posts_found', count: posts.length, posts }));
              fs.mkdirSync(seriesId, { recursive: true });
              posts.forEach(f => fs.copyFileSync(path.join(vaultSeries, f), path.join(seriesId, f)));
              console.log(JSON.stringify({ event: 'vault_posts_copied', count: posts.length }));
            } else {
              console.log(JSON.stringify({ event: 'no_vault_series_dir', vaultSeries }));
            }
          })()"

      - name: Check Gemini Quota (before)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: npx tsx scripts/check-gemini-quota.ts --label "before blog generation"

      - name: Generate Blog Post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_GEMINI_MODEL: ${{ vars.BLOG_GEMINI_MODEL || 'gemini-3.1-flash-lite-preview' }}
          BLOG_PRIORITY_USER: ${{ vars.CHICKIE_LOO_PRIORITY_USER || 'ChickieLoo' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SERIES="chickie-loo"
          npx tsx scripts/generate-blog-post.ts --series ${SERIES}
          POST=$(ls -1 ${SERIES}/$(date +%Y-%m-%d)*.md 2>/dev/null | head -1)
          echo "post=${POST}" >> $GITHUB_OUTPUT

      - name: Generate Blog Image
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_IMAGE_MODEL: ${{ vars.CLOUDFLARE_IMAGE_MODEL || '@cf/black-forest-labs/flux-1-schnell' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_GEMINI_MODEL: ${{ vars.IMAGE_GEMINI_MODEL || 'gemini-3.1-flash-image-preview' }}
          PROMPT_DESCRIBER_MODEL: ${{ vars.PROMPT_DESCRIBER_MODEL || 'gemini-3.1-flash-lite-preview' }}
        run: |
          POST="${{ steps.generate.outputs.post }}"
          if [ -n "$POST" ]; then
            echo "🖼️ Generating image for: $POST"
            npx tsx scripts/generate-blog-image.ts --note "$POST"
          else
            echo "No new post to generate image for"
          fi

      - name: Check Gemini Quota (after)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: npx tsx scripts/check-gemini-quota.ts --label "after blog generation"

      - name: Sync Posts to Obsidian Vault
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: |
          SERIES="chickie-loo"
          POST="${{ steps.generate.outputs.post }}"
          if [ -n "$POST" ]; then
            echo "📝 Syncing new post: $POST"
            npx tsx scripts/sync-file-to-obsidian.ts "$POST" "$POST"
            META="${SERIES}/.last-generate-metadata.json"
            if [ -f "$META" ]; then
              PREV_FILE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$META','utf-8')).previousPostFilename)")
              PREV="${SERIES}/${PREV_FILE}"
              echo "📝 Syncing updated previous post: $PREV"
              if [ -f "$PREV" ]; then
                npx tsx scripts/sync-file-to-obsidian.ts "$PREV" "$PREV"
              else
                echo "⚠️ Previous post file not found: $PREV"
              fi
            else
              echo "ℹ️ No metadata file — first post in series"
            fi
            echo "📝 Syncing AGENTS.md: ${SERIES}/AGENTS.md"
            npx tsx scripts/sync-file-to-obsidian.ts "${SERIES}/AGENTS.md" "${SERIES}/AGENTS.md"
          else
            echo "No new post generated today"
          fi

      - name: Update Daily Reflection
        if: ${{ success() }}
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: |
          POST="${{ steps.generate.outputs.post }}"
          if [ -n "$POST" ]; then
            SERIES="chickie-loo"
            echo "📝 Updating daily reflection for: $POST"
            npx tsx scripts/update-daily-reflection.ts --series ${SERIES} --post "$POST"
          else
            echo "No new post to update reflection for"
          fi

      - name: Sync Image to Obsidian Vault
        if: ${{ success() }}
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: npx tsx scripts/sync-attachments-to-vault.ts attachments
