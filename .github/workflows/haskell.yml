name: Haskell CI

on:
  push:
    paths:
      - 'haskell/**'
      - '.github/workflows/haskell.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: haskell:9.14.1
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cabal packages
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-ghc914-${{ hashFiles('haskell/automation.cabal') }}
          restore-keys: cabal-ghc914-

      - name: Build
        working-directory: haskell
        run: cabal update && cabal build

      - name: Test
        working-directory: haskell
        run: cabal test
