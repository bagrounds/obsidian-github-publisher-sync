name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  discussions: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git dates

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v3-${{ runner.os }}-node22-

      - name: Cache Quartz Build
        uses: actions/cache@v4
        with:
          path: quartz/.quartz-cache
          key: quartz-cache-${{ hashFiles('content/**/*.md', 'quartz.config.ts', 'quartz/**/*.ts', 'quartz/**/*.tsx') }}
          restore-keys: |
            quartz-cache-

      - name: Install Dependencies (if cache is not hit)
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Install GHC 9.14.1 and Cabal via ghcup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | BOOTSTRAP_HASKELL_NONINTERACTIVE=1 BOOTSTRAP_HASKELL_GHC_VERSION=9.14.1 BOOTSTRAP_HASKELL_CABAL_VERSION=3.16.1.0 sh
          echo "$HOME/.ghcup/bin" >> "$GITHUB_PATH"

      - name: Cache Cabal packages
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-${{ runner.os }}-ghc914-${{ hashFiles('haskell/automation.cabal') }}
          restore-keys: cabal-${{ runner.os }}-ghc914-

      - name: Build Haskell inject-giscus
        working-directory: haskell
        run: cabal update && cabal build inject-giscus

      - name: Inject static Giscus comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd haskell && cabal run inject-giscus -- ../public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          reporting_interval: 300
          error_count: 180
