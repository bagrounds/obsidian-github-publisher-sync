name: Auto Post to Social Media

on:
  schedule:
    # Run every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Reflection date (YYYY-MM-DD). Defaults to yesterday."
        required: false
        type: string
      note:
        description: "Note path relative to content/ (e.g. books/sophies-world.md). Overrides date."
        required: false
        type: string
      dry_run:
        description: "Dry run mode (generate post but don't post)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      # Cache the Obsidian vault between runs for incremental sync.
      # Cold sync downloads the entire vault (~7 min). With a warm cache,
      # `ob sync` only pulls changes since the last run (seconds).
      # Key uses run_id so each run saves its updated vault state.
      # restore-keys prefix ensures the previous run's cache is restored.
      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: |
            obsidian-vault-

      - name: Run Social Posting Script
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemma-3-27b-it' }}
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_PASSWORD: ${{ secrets.OBSIDIAN_VAULT_PASSWORD }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
          DISABLE_TWITTER: ${{ vars.DISABLE_TWITTER || '' }}
          DISABLE_BLUESKY: ${{ vars.DISABLE_BLUESKY || '' }}
          DISABLE_MASTODON: ${{ vars.DISABLE_MASTODON || '' }}
        run: |
          # If a specific note or date was provided via manual trigger, use tweet-reflection.ts directly
          if [ -n "${{ github.event.inputs.note }}" ] || [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS=""
            if [ -n "${{ github.event.inputs.note }}" ]; then
              ARGS="$ARGS --note ${{ github.event.inputs.note }}"
            fi
            if [ -n "${{ github.event.inputs.date }}" ]; then
              ARGS="$ARGS --date ${{ github.event.inputs.date }}"
            fi
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            npx tsx scripts/tweet-reflection.ts $ARGS
          else
            # Scheduled run: use auto-post orchestrator for BFS discovery
            ARGS=""
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            npx tsx scripts/auto-post.ts $ARGS
          fi
