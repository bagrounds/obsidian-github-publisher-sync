name: Haskell CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'haskell/**'
      - '.github/workflows/haskell.yml'

concurrency:
  group: "haskell-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: haskell:9.14.1
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cabal packages and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            haskell/dist-newstyle
          key: cabal-ghc914-${{ hashFiles('haskell/automation.cabal') }}-${{ hashFiles('haskell/src/**', 'haskell/app/**', 'haskell/test/**') }}
          restore-keys: |
            cabal-ghc914-${{ hashFiles('haskell/automation.cabal') }}-
            cabal-ghc914-

      - name: Build
        working-directory: haskell
        run: cabal update && cabal build all -j --ghc-options="-Werror"

      - name: Lint
        working-directory: haskell
        run: |
          apt-get update -qq && apt-get install -y -qq hlint > /dev/null 2>&1
          hlint src/ app/ test/

      - name: Test
        working-directory: haskell
        run: cabal test --test-show-details=direct

      - name: Stage executables
        working-directory: haskell
        run: |
          mkdir -p /tmp/haskell-bin
          cp "$(cabal list-bin run-scheduled)" /tmp/haskell-bin/
          cp "$(cabal list-bin inject-giscus)" /tmp/haskell-bin/

      - uses: actions/upload-artifact@v4
        with:
          name: haskell-binaries
          path: /tmp/haskell-bin/
          retention-days: 90
