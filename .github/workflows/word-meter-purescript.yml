name: Word Meter PureScript CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'purs-ps/**'
      - 'tests/e2e/**'
      - 'quartz/static/word-meter.js'
      - 'scripts/build-word-meter-ps.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/word-meter-purescript.yml'
  pull_request:
    paths:
      - 'purs-ps/**'
      - 'tests/e2e/**'
      - 'quartz/static/word-meter.js'
      - 'scripts/build-word-meter-ps.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/word-meter-purescript.yml'

concurrency:
  group: "word-meter-purescript-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  purescript-unit-tests:
    name: PureScript unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Spago downloads and build output
        uses: actions/cache@v4
        with:
          path: |
            purs-ps/.spago
            purs-ps/output
            ~/.cache/spago-nodejs
          key: spago-${{ runner.os }}-${{ hashFiles('purs-ps/spago.lock', 'purs-ps/spago.yaml') }}
          restore-keys: |
            spago-${{ runner.os }}-

      - name: Build word-meter bundle
        run: npm run build:ps

      - name: Run PureScript unit tests
        run: npm run test:ps

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: word-meter-bundle
          path: quartz/static/word-meter.js
          retention-days: 14

  playwright-e2e-tests:
    name: Playwright end-to-end tests
    runs-on: ubuntu-latest
    needs: purescript-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Spago downloads and build output
        uses: actions/cache@v4
        with:
          path: |
            purs-ps/.spago
            purs-ps/output
            ~/.cache/spago-nodejs
          key: spago-${{ runner.os }}-${{ hashFiles('purs-ps/spago.lock', 'purs-ps/spago.yaml') }}
          restore-keys: |
            spago-${{ runner.os }}-

      - name: Build word-meter bundle
        run: npm run build:ps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
