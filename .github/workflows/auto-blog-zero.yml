name: Auto Blog Zero — Daily Post

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch: {}

env:
  TZ: America/Los_Angeles

permissions:
  contents: read
  discussions: read

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: obsidian-vault-

      - name: Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_GEMINI_MODEL: ${{ vars.BLOG_GEMINI_MODEL || 'gemini-3.1-flash-lite-preview' }}
          BLOG_PRIORITY_USER: ${{ vars.AUTO_BLOG_ZERO_PRIORITY_USER || 'bagrounds' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/generate-blog-post.ts --series auto-blog-zero

      - name: Sync Posts to Obsidian Vault
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: |
          for POST in auto-blog-zero/$(date +%Y-%m-%d)*.md; do
            [ -f "$POST" ] && npx tsx scripts/sync-file-to-obsidian.ts "$POST" "$POST"
          done
          for PREV in auto-blog-zero/*.md; do
            [ -f "$PREV" ] && [[ ! "$PREV" =~ $(date +%Y-%m-%d) ]] && [[ "$PREV" != *AGENTS.md ]] && npx tsx scripts/sync-file-to-obsidian.ts "$PREV" "$PREV"
          done
