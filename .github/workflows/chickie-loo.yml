name: Chickie Loo — Daily Post

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch: {}

env:
  TZ: America/Los_Angeles

permissions:
  contents: read
  discussions: read

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: obsidian-vault-

      - name: Pull Vault Posts
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: npx tsx scripts/pull-vault-posts.ts chickie-loo

      - name: Check Gemini Quota (before)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: npx tsx scripts/check-gemini-quota.ts --label "before blog generation"

      - name: Generate Blog Post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_GEMINI_MODEL: ${{ vars.BLOG_GEMINI_MODEL || 'gemini-3.1-flash-lite-preview' }}
          BLOG_PRIORITY_USER: ${{ vars.CHICKIE_LOO_PRIORITY_USER || 'ChickieLoo' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: npx tsx scripts/generate-blog-post.ts --series chickie-loo

      - name: Generate Blog Image
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_IMAGE_MODEL: ${{ vars.CLOUDFLARE_IMAGE_MODEL || '@cf/black-forest-labs/flux-1-schnell' }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          HUGGINGFACE_IMAGE_MODEL: ${{ vars.HUGGINGFACE_IMAGE_MODEL || 'black-forest-labs/FLUX.1-schnell' }}
          TOGETHER_API_TOKEN: ${{ secrets.TOGETHER_API_TOKEN }}
          TOGETHER_IMAGE_MODEL: ${{ vars.TOGETHER_IMAGE_MODEL || 'black-forest-labs/FLUX.1-schnell-Free' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_GEMINI_MODEL: ${{ vars.IMAGE_GEMINI_MODEL || 'gemini-3.1-flash-image-preview' }}
          PROMPT_DESCRIBER_MODEL: ${{ vars.PROMPT_DESCRIBER_MODEL || 'gemini-3.1-flash-lite-preview' }}
        run: npx tsx scripts/generate-blog-image.ts --note "${{ steps.generate.outputs.post }}"

      - name: Check Gemini Quota (after)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: npx tsx scripts/check-gemini-quota.ts --label "after blog generation"

      - name: Sync to Obsidian Vault
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: >-
          npx tsx scripts/sync-series-to-vault.ts
          --series chickie-loo
          --post "${{ steps.generate.outputs.post }}"
