name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
      - copilot/add-audio-player-to-webpages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git dates

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v3-${{ runner.os }}-node22-

      - name: Cache Quartz Build
        uses: actions/cache@v4
        with:
          path: quartz/.quartz-cache
          key: quartz-cache-${{ hashFiles('content/**/*.md', 'quartz.config.ts', 'quartz/**/*.ts', 'quartz/**/*.tsx') }}
          restore-keys: |
            quartz-cache-

      - name: Install Dependencies (if cache is not hit)
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/copilot/add-audio-player-to-webpages'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          reporting_interval: 300
          error_count: 180
