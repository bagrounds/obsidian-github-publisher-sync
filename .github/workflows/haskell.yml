name: Haskell CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'haskell/**'
      - '.github/workflows/haskell.yml'
  pull_request:
    paths:
      - 'haskell/**'
      - '.github/workflows/haskell.yml'

concurrency:
  group: "haskell-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: haskell:9.14.1
    env:
      CABAL_DIR: /github/home/.cabal
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cabal packages and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            haskell/dist-newstyle
          key: cabal-ghc914-${{ hashFiles('haskell/automation.cabal', 'haskell/cabal.project') }}-${{ hashFiles('haskell/src/**', 'haskell/app/**', 'haskell/test/**') }}
          restore-keys: |
            cabal-ghc914-${{ hashFiles('haskell/automation.cabal', 'haskell/cabal.project') }}-
            cabal-ghc914-

      - name: Update Hackage index
        working-directory: haskell
        run: |
          if [ ! -d "$CABAL_DIR/packages/hackage.haskell.org" ]; then
            cabal update
          fi

      - name: Build
        working-directory: haskell
        run: cabal build all -j || { echo "Retrying with fresh package index..."; cabal update && cabal build all -j; }

      - name: Test
        working-directory: haskell
        run: cabal test --test-show-details=direct

      - name: Stage executables
        working-directory: haskell
        run: |
          mkdir -p /tmp/haskell-bin
          cp "$(cabal list-bin run-scheduled)" /tmp/haskell-bin/
          cp "$(cabal list-bin inject-giscus)" /tmp/haskell-bin/

      - uses: actions/upload-artifact@v4
        with:
          name: haskell-binaries
          path: /tmp/haskell-bin/
          retention-days: 90

  lint:
    runs-on: ubuntu-latest
    container: haskell:9.14.1
    steps:
      - uses: actions/checkout@v4

      - name: Install and run HLint
        working-directory: haskell
        run: |
          apt-get update -qq && apt-get install -y -qq hlint
          hlint src/ app/ test/
