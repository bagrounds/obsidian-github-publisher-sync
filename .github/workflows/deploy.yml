name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  discussions: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-haskell:
    runs-on: ubuntu-latest
    container: haskell:9.14.1
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cabal packages
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: cabal-ghc914-${{ hashFiles('haskell/automation.cabal') }}
          restore-keys: cabal-ghc914-

      - name: Build
        working-directory: haskell
        run: cabal update && cabal build inject-giscus

      - name: Stage executable
        working-directory: haskell
        run: |
          mkdir -p /tmp/haskell-bin
          cp "$(cabal list-bin inject-giscus)" /tmp/haskell-bin/

      - uses: actions/upload-artifact@v4
        with:
          name: inject-giscus
          path: /tmp/haskell-bin/inject-giscus

  build:
    needs: build-haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git dates

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v3-${{ runner.os }}-node22-

      - name: Cache Quartz Build
        uses: actions/cache@v4
        with:
          path: quartz/.quartz-cache
          key: quartz-cache-${{ hashFiles('content/**/*.md', 'quartz.config.ts', 'quartz/**/*.ts', 'quartz/**/*.tsx') }}
          restore-keys: |
            quartz-cache-

      - name: Install Dependencies (if cache is not hit)
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - uses: actions/download-artifact@v4
        with:
          name: inject-giscus
          path: bin/

      - name: Inject static Giscus comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: chmod +x bin/inject-giscus && bin/inject-giscus public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          reporting_interval: 300
          error_count: 180
