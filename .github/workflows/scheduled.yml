name: Scheduled Tasks

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Run a specific task (e.g. social-posting, blog-series:chickie-loo, internal-linking)"
        required: false
        type: string
      hour:
        description: "Simulate a specific UTC hour (0-23) instead of using the current time"
        required: false
        type: string

env:
  TZ: America/Los_Angeles

permissions:
  contents: read
  discussions: read
  actions: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: obsidian-vault-

      - name: Download pre-built run-scheduled binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --workflow=haskell.yml --status=success --limit=1 --json databaseId -q '.[0].databaseId')
          gh run download "$RUN_ID" --name haskell-binaries --dir bin/
          chmod +x bin/run-scheduled

      - name: Run Scheduled Tasks
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_PASSWORD: ${{ secrets.OBSIDIAN_VAULT_PASSWORD }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_IMAGE_MODEL: ${{ vars.CLOUDFLARE_IMAGE_MODEL || '@cf/black-forest-labs/flux-1-schnell' }}
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
          HUGGINGFACE_IMAGE_MODEL: ${{ vars.HUGGINGFACE_IMAGE_MODEL || 'black-forest-labs/FLUX.1-schnell' }}
          TOGETHER_API_TOKEN: ${{ secrets.TOGETHER_API_TOKEN }}
          TOGETHER_IMAGE_MODEL: ${{ vars.TOGETHER_IMAGE_MODEL || 'black-forest-labs/FLUX.1-schnell-Free' }}
          POLLINATIONS_ENABLED: "true"
          POLLINATIONS_IMAGE_MODEL: ${{ vars.POLLINATIONS_IMAGE_MODEL || 'flux' }}
          IMAGE_GEMINI_MODEL: ${{ vars.IMAGE_GEMINI_MODEL || 'gemini-3.1-flash-image-preview' }}
          PROMPT_DESCRIBER_MODEL: ${{ vars.PROMPT_DESCRIBER_MODEL || 'gemini-3.1-flash-lite-preview' }}
          BLOG_GEMINI_MODEL: ${{ vars.BLOG_GEMINI_MODEL || '' }}
          CHICKIE_LOO_PRIORITY_USER: ${{ vars.CHICKIE_LOO_PRIORITY_USER || '' }}
          AUTO_BLOG_ZERO_PRIORITY_USER: ${{ vars.AUTO_BLOG_ZERO_PRIORITY_USER || '' }}
          SYSTEMS_FOR_PUBLIC_GOOD_PRIORITY_USER: ${{ vars.SYSTEMS_FOR_PUBLIC_GOOD_PRIORITY_USER || '' }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemma-3-27b-it' }}
          DISABLE_TWITTER: ${{ vars.DISABLE_TWITTER || '' }}
          DISABLE_BLUESKY: ${{ vars.DISABLE_BLUESKY || '' }}
          DISABLE_MASTODON: ${{ vars.DISABLE_MASTODON || '' }}
          LINKING_MODEL: ${{ vars.LINKING_MODEL || 'gemini-3.1-flash-lite-preview' }}
          REPO_ROOT: ${{ github.workspace }}
        run: >-
          bin/run-scheduled
          ${{ github.event.inputs.task && format('--task {0}', github.event.inputs.task) || '' }}
          ${{ github.event.inputs.hour && format('--hour {0}', github.event.inputs.hour) || '' }}
