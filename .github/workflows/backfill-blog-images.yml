name: Backfill Blog Images

on:
  schedule:
    - cron: "0 6 * * *" # 10 PM Pacific = 6 AM UTC next day
  workflow_dispatch: {}

env:
  TZ: America/Los_Angeles

permissions:
  contents: read

jobs:
  backfill-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: obsidian-vault-

      - name: Pull Vault Posts
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: npx tsx scripts/pull-vault-posts.ts reflections auto-blog-zero chickie-loo ai-blog

      - name: Check Gemini Quota (before)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: npx tsx scripts/check-gemini-quota.ts --label "before image backfill"

      - name: Backfill Blog Images
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_IMAGE_MODEL: ${{ vars.CLOUDFLARE_IMAGE_MODEL || '@cf/black-forest-labs/flux-1-schnell' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE_GEMINI_MODEL: ${{ vars.IMAGE_GEMINI_MODEL || 'gemini-3.1-flash-image-preview' }}
          PROMPT_DESCRIBER_MODEL: ${{ vars.PROMPT_DESCRIBER_MODEL || 'gemini-3.1-flash-lite-preview' }}
        run: npx tsx scripts/backfill-blog-images.ts

      - name: Check Gemini Quota (after)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: npx tsx scripts/check-gemini-quota.ts --label "after image backfill"

      - name: Sync Changes to Obsidian Vault
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: npx tsx scripts/sync-backfill-to-vault.ts
