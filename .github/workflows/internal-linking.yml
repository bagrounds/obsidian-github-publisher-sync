name: Internal Linking — BFS Wikilink Insertion

on:
  schedule:
    - cron: "30 7 * * *" # ~11:30 PM PT
  workflow_dispatch:
    inputs:
      max_files:
        description: "Maximum number of files to edit"
        required: false
        default: "10"
        type: string
      dry_run:
        description: "Preview without writing changes"
        required: false
        default: "false"
        type: boolean

env:
  TZ: America/Los_Angeles

permissions:
  contents: read

jobs:
  internal-linking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: obsidian-vault-

      - name: Pull Obsidian Vault
        id: vault
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: |
          npx tsx -e "(async () => {
            const { syncObsidianVault } = await import('./scripts/lib/obsidian-sync.ts');
            const fs = await import('fs');
            const dir = await syncObsidianVault({
              authToken: process.env.OBSIDIAN_AUTH_TOKEN,
              vaultName: process.env.OBSIDIAN_VAULT_NAME,
            });
            fs.writeFileSync('/tmp/vault-dir.txt', dir);
          })()"
          VAULT_DIR=$(cat /tmp/vault-dir.txt)
          echo "vault_dir=$VAULT_DIR" >> "$GITHUB_OUTPUT"
          echo "📂 Vault pulled to: $VAULT_DIR"

      - name: Run Internal Linking
        id: linking
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKING_MODEL: ${{ vars.LINKING_MODEL || 'gemini-3.1-flash-lite-preview' }}
        run: |
          MAX_FILES="${{ github.event.inputs.max_files || '10' }}"
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          npx tsx scripts/internal-linking.ts \
            --max-files "$MAX_FILES" \
            --content-dir "${{ steps.vault.outputs.vault_dir }}" \
            $DRY_RUN_FLAG \
            | tee /tmp/linking-output.log

          # Check if any files were modified
          MODIFIED=$(grep '"event":"modified_files"' /tmp/linking-output.log | tail -1 || true)
          if [ -n "$MODIFIED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push Obsidian Vault
        if: ${{ steps.linking.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true' }}
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
        run: |
          npx tsx -e "(async () => {
            const { pushObsidianVault } = await import('./scripts/lib/obsidian-sync.ts');
            await pushObsidianVault('${{ steps.vault.outputs.vault_dir }}', {
              authToken: process.env.OBSIDIAN_AUTH_TOKEN,
            });
          })()"
          echo "📤 Vault pushed with link changes"
