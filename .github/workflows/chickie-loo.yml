name: Chickie Loo — Daily Post

on:
  schedule:
    # Run daily at 16:00 UTC (9 AM PDT / 8 AM PST)
    # 1 hour before the social media auto-post job
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      issue:
        description: "GitHub Issue number for reader comments (optional)"
        required: false
        type: string

permissions:
  contents: write
  issues: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: v3-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            v3-${{ runner.os }}-node22-

      - name: Install Dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Install Obsidian Headless CLI
        run: npm install -g obsidian-headless

      - name: Cache Obsidian Vault
        uses: actions/cache@v4
        with:
          path: /tmp/obsidian-vault-cache
          key: obsidian-vault-${{ github.run_id }}
          restore-keys: |
            obsidian-vault-

      - name: Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_GEMINI_MODEL: ${{ vars.BLOG_GEMINI_MODEL || 'gemini-2.0-flash' }}
          BLOG_PRIORITY_USER: ${{ vars.CHICKIE_LOO_PRIORITY_USER || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--series chickie-loo"
          ISSUE="${{ github.event.inputs.issue || vars.CHICKIE_LOO_ISSUE }}"
          if [ -n "$ISSUE" ]; then
            ARGS="$ARGS --issue $ISSUE"
          fi
          npx tsx scripts/generate-blog-post.ts $ARGS

      - name: Sync to Obsidian Vault
        env:
          OBSIDIAN_AUTH_TOKEN: ${{ secrets.OBSIDIAN_AUTH_TOKEN }}
          OBSIDIAN_VAULT_NAME: ${{ secrets.OBSIDIAN_VAULT_NAME }}
          OBSIDIAN_VAULT_PASSWORD: ${{ secrets.OBSIDIAN_VAULT_PASSWORD }}
          OBSIDIAN_VAULT_CACHE_DIR: /tmp/obsidian-vault-cache
        run: npx tsx scripts/sync-blog-to-obsidian.ts --series chickie-loo

      - name: Commit and Push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add chickie-loo/
          if git diff --cached --quiet; then
            echo "No new posts to commit"
          else
            git commit -m "🐔 Chickie Loo: daily post for $(date -u +%Y-%m-%d)"
            git push
          fi
